name: Build and Push vibe-gateway to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ghcr.io/vibe-social-app/vibe-gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set tags
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: podman build -t vibe-gateway:latest .

      - name: Tag latest
        run: podman tag vibe-gateway:latest $IMAGE_NAME:latest

      - name: Tag commit sha
        run: podman tag vibe-gateway:latest $IMAGE_NAME:${{ env.SHORT_SHA }}

      - name: Push latest
        run: podman push $IMAGE_NAME:latest

      - name: Push sha tag
        run: podman push $IMAGE_NAME:${{ env.SHORT_SHA }}
